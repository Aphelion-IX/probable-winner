services:
  # Local search index (backlog B-021, blueprint §24). Fixed API key for
  # local dev only — never reuse this key outside a local/dev environment.
  typesense:
    image: typesense/typesense:27.1
    restart: unless-stopped
    ports:
      - "8108:8108"
    volumes:
      - typesense-data:/data
    command: "--data-dir /data --api-key=local-dev-typesense-key --enable-cors"

volumes:
  typesense-data:

name: Enqueue Catalogue Import

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "yes" to confirm full catalogue import'
        required: true
        default: ''

jobs:
  enqueue:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Enqueue catalogue discovery
        run: pnpm --filter worker enqueue-catalogue-import
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}

      - name: Success
        run: echo "Catalogue sets enqueued successfully"

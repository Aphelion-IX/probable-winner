name: Catalogue Import Worker

on:
  workflow_dispatch:
  schedule:
    # Run every 30 minutes to process batches
    - cron: "*/30 * * * *"

jobs:
  worker:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run catalogue import worker
        run: timeout 1200 pnpm --filter worker start || true
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}

      - name: Report status
        run: echo "Worker batch completed. Check Supabase for progress."
